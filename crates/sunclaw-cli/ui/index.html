<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunclaw Command Center | Elite AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --bg-dark: #020617;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1b4b, var(--bg-dark));
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .accent-border { border-color: var(--accent); }
        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
            100% { box-shadow: 0 0 5px var(--accent-glow); }
        }
        .glow { animation: pulse-glow 3s infinite; }
        
        .chat-bubble {
            max-width: 85%;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        
        .trace-card {
            border-left: 2px solid var(--glass-border);
            transition: all 0.2s ease;
        }
        .trace-card:hover {
            border-left-color: var(--accent);
            background: rgba(255,255,255,0.02);
            transform: translateX(4px);
        }
        
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
    </style>
</head>
<body class="flex p-4 gap-4 overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside class="w-20 lg:w-64 glass-panel rounded-[2rem] flex flex-col items-center lg:items-stretch p-6 gap-8">
        <div class="flex items-center gap-3 px-2">
            <div class="w-12 h-12 accent-bg rounded-2xl flex items-center justify-center font-bold text-2xl shadow-xl glow">S</div>
            <div class="hidden lg:block">
                <h1 class="font-bold tracking-tighter text-xl leading-none">SUNCLAW</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Command Center</p>
            </div>
        </div>

        <nav class="flex-1 flex flex-col gap-3">
            <button class="flex items-center gap-4 p-4 rounded-2xl accent-bg shadow-lg shadow-purple-500/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="hidden lg:block font-semibold">Dashboard</span>
            </button>
            <button class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition-all text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="hidden lg:block font-semibold">Agent Teams</span>
            </button>
            <button class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition-all text-slate-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                <span class="hidden lg:block font-semibold">Knowledge</span>
            </button>
        </nav>

        <div class="hidden lg:flex flex-col gap-4 p-4 rounded-3xl bg-black/20 border border-white/5">
            <h3 class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Active Tools</h3>
            <div class="flex flex-wrap gap-2">
                <span class="px-2 py-1 bg-green-500/10 text-green-400 text-[10px] rounded-md border border-green-500/20">web_search</span>
                <span class="px-2 py-1 bg-blue-500/10 text-blue-400 text-[10px] rounded-md border border-blue-500/20">file_sys</span>
                <span class="px-2 py-1 bg-purple-500/10 text-purple-400 text-[10px] rounded-md border border-purple-500/20">mcp_gateway</span>
            </div>
        </div>
    </aside>

    <!-- Main Viewport -->
    <main class="flex-1 flex flex-col gap-4">
        <!-- Persistent System Header -->
        <header class="h-20 glass-panel rounded-[2rem] flex items-center px-10 justify-between">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="status-dot"></div>
                    <span class="font-bold tracking-tight">AGENT STATUS: <span class="text-green-400">OPTIMAL</span></span>
                </div>
                <div class="h-6 w-px bg-white/10 hidden md:block"></div>
                <div class="hidden md:flex items-center gap-4 text-xs text-slate-400 mono">
                    <span>UPTIME: 12:45:03</span>
                    <span>SESSION: RX-909</span>
                </div>
            </div>
            
            <div class="flex items-center gap-8">
                <div class="hidden xl:flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">CPU LOAD</p>
                        <p class="text-sm font-bold mono">14.2%</p>
                    </div>
                    <div class="w-16 h-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="bg-green-500 h-full w-[14%]"></div>
                    </div>
                </div>
                <div class="hidden xl:flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">RAM USAGE</p>
                        <p class="text-sm font-bold mono">124MB</p>
                    </div>
                    <div class="w-16 h-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="bg-purple-500 h-full w-[22%]"></div>
                    </div>
                </div>
            </div>
        </header>

        <section class="flex-1 flex gap-4 overflow-hidden">
            <!-- Chat Interactive Area -->
            <div class="flex-1 flex flex-col gap-4 overflow-hidden">
                <div id="chat-messages" class="flex-1 glass-panel rounded-[2.5rem] p-8 overflow-y-auto flex flex-col gap-6">
                    <!-- Initial Welcome -->
                    <div class="flex flex-col items-center justify-center h-full opacity-30 gap-6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9.05V9.1"/><path d="M16 9.05V9.1"/><path d="M12 14v.01"/><path d="M8 17s1.5 2 4 2 4-2 4-2"/></svg>
                        <h2 class="text-2xl font-light tracking-widest uppercase">System Standby</h2>
                    </div>
                </div>

                <!-- Elite Input Field -->
                <div class="h-20 glass-panel rounded-[2rem] p-2 flex items-center gap-4 group focus-within:accent-border transition-all">
                    <div class="w-12 h-12 flex items-center justify-center text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 2-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3y-3.5"/></svg>
                    </div>
                    <input id="chat-input" type="text" placeholder="Gửi chỉ thị cho Sunclaw..." class="flex-1 bg-transparent border-none outline-none text-lg font-medium placeholder:text-slate-700" />
                    <button onclick="sendMessage()" class="h-12 w-12 accent-bg rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-95 group-hover:glow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>

            <!-- Intelligent Trace Panel -->
            <aside class="w-80 lg:w-96 glass-panel rounded-[2.5rem] flex flex-col overflow-hidden">
                <div class="p-6 border-b border-white/5 flex items-center justify-between">
                    <h3 class="font-bold text-xs uppercase tracking-[0.2em] text-slate-400 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        <span>Thought Engine</span>
                    </h3>
                    <div class="flex gap-1">
                        <div class="w-1 h-1 rounded-full bg-purple-500 animate-ping"></div>
                    </div>
                </div>
                
                <div id="traces" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 mono text-[11px]">
                    <div class="h-full flex items-center justify-center text-slate-700 italic">Waiting for telemetry...</div>
                </div>

                <div class="p-6 bg-purple-500/5 border-t border-purple-500/10">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold text-purple-400 uppercase">Context Density</span>
                        <span class="text-[10px] mono text-purple-300">1,242 / 4,096</span>
                    </div>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-purple-500 h-full w-[30%]"></div>
                    </div>
                </div>
            </aside>
        </section>
    </main>

    <script>
        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Clear welcome screen if present
            if (messages.querySelector('.opacity-30')) {
                messages.innerHTML = '';
            }

            appendMessage('user', text);
            input.value = '';

            const thinkingId = appendMessage('bot', 'Processing intent...');
            
            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                updateMessage(thinkingId, data.output);
                loadTraces(data.trace_id);
            } catch (error) {
                updateMessage(thinkingId, "ERROR_FAILURE: " + error.message);
            }
        }

        function appendMessage(role, text) {
            const id = 'msg-' + Date.now();
            const container = document.createElement('div');
            container.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const div = document.createElement('div');
            div.id = id;
            div.className = `chat-bubble p-5 rounded-[2rem] ${role === 'user' ? 'accent-bg text-white shadow-xl shadow-purple-500/20' : 'glass-panel text-slate-200'}`;
            div.innerHTML = text;
            
            container.appendChild(div);
            messages.appendChild(container);
            messages.scrollTop = messages.scrollHeight;
            return id;
        }

        function updateMessage(id, text) {
            document.getElementById(id).innerHTML = text;
        }

        async function loadTraces(traceId) {
            const container = document.getElementById('traces');
            container.innerHTML = '<div class="text-purple-400 p-2 animate-pulse">Establishing data link...</div>';
            
            try {
                const response = await fetch(`/api/v1/trace/${traceId}`);
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<div class="text-slate-700 italic p-4 text-center">Telemetry stream empty</div>';
                    return;
                }

                container.innerHTML = events.map(e => {
                    let color = "text-purple-400";
                    let icon = "◈";
                    let bg = "bg-purple-500/5";
                    
                    if (e.event_type === "tool_call") { color = "text-yellow-400"; icon = "⚔"; bg = "bg-yellow-500/5"; }
                    if (e.event_type === "tool_result") { color = "text-green-400"; icon = "✓"; bg = "bg-green-500/5"; }
                    if (e.event_type === "error") { color = "text-red-400"; icon = "⚠"; bg = "bg-red-500/5"; }

                    return `
                        <div class="trace-card p-4 rounded-2xl ${bg} border border-white/5">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="${color} font-bold">${icon} ${e.event_type.toUpperCase()}</span>
                            </div>
                            <div class="text-slate-400 leading-relaxed">${e.content}</div>
                            ${e.metadata ? `<div class="mt-3 text-[9px] text-slate-600 bg-black/40 p-2 rounded-lg border border-white/5 overflow-x-auto">${JSON.stringify(e.metadata, null, 2)}</div>` : ''}
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                container.innerHTML = '<div class="text-red-500 p-2">LINK_FAILURE: Telemetry sync failed</div>';
            }
        }
    </script>
</body>
</html>
