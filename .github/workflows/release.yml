name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform.os }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: sunclaw
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: sunclaw
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: sunclaw.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.platform.target }} -p sunclaw-cli

      - name: Package
        shell: bash
        run: |
          mkdir -p staging
          mv target/release/${{ matrix.platform.bin }} staging/${{ matrix.platform.bin }} || mv target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} staging/${{ matrix.platform.bin }}

      - name: Archive (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "staging\*" -DestinationPath "sunclaw-${{ matrix.platform.target }}.zip" -Force

      - name: Archive (Unix)
        if: matrix.platform.os != 'windows-latest'
        shell: bash
        run: |
          tar -czf sunclaw-${{ matrix.platform.target }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunclaw-${{ matrix.platform.target }}
          path: sunclaw-${{ matrix.platform.target }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
